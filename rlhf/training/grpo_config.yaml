model:
  adapter: "cristicretu/code-reviewer-lora"
  max_seq_length: 2048

lora:
  r: 16
  alpha: 16
  dropout: 0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

data:
  train_path: "data/processed/train.jsonl"
  max_train_samples: 250

training:
  num_train_epochs: 1
  per_device_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-6
  num_generations: 4
  temperature: 0.8
  max_prompt_length: 512
  max_new_tokens: 512
  seed: 42

judge:
  model: "claude-haiku-4-5-20251001"
  sleep_between_calls: 0.25
  max_workers: 8

output:
  dir: "outputs/grpo"
  logging_steps: 10
  save_steps: 50
  save_total_limit: 2
  hub_model_id: null
  report_to: "none"